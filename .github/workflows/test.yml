name: Test & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint
        env:
          CI: true

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests with coverage
        run: bun run test:coverage
        env:
          CI: true

      - name: Check coverage threshold
        run: |
          COVERAGE=$(cat coverage/bun/index.html 2>/dev/null | grep -oP '\d+\.\d+%' | head -1 | tr -d '%' || echo "0")
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 85" | bc -l) )); then
            echo "ERROR: Coverage $COVERAGE% is below 85% threshold"
            exit 1
          fi
          echo "Coverage $COVERAGE% meets 85% threshold"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const html = fs.readFileSync('coverage/bun/index.html', 'utf8');
            const match = html.match(/(\d+\.\d+)%/);
            const coverage = match ? match[1] : 'unknown';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Coverage Report\n\n| Metric | Value |\n|--------|-------|\n| Coverage | ${coverage}% |\n| Threshold | 85% |\n\n${parseFloat(coverage) >= 85 ? '✅ Coverage requirement met' : '❌ Coverage below threshold'}`
            });
