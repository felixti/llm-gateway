name: Test & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/llm_gateway_test
      PAT_SECRET: test-secret-that-is-at-least-32-chars-for-ci-only
      QUOTA_PG_SYNC_IN_TESTS: 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: llm_gateway_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d llm_gateway_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint
        env:
          CI: true

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests with coverage threshold
        run: bun run test:coverage:check
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const html = fs.readFileSync('coverage/bun/index.html', 'utf8');
            const match = html.match(/(\d+\.\d+)%/);
            const coverage = match ? match[1] : 'unknown';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Coverage Report\n\n| Metric | Value |\n|--------|-------|\n| Coverage | ${coverage}% |\n| Threshold | 85% |\n\n${parseFloat(coverage) >= 85 ? '✅ Coverage requirement met' : '❌ Coverage below threshold'}`
            });
