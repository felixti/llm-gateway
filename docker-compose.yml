version: '3.9'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - LOG_LEVEL=debug
      # Azure OpenAI
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      # Azure AI Foundry
      - AZURE_AI_FOUNDRY_ENDPOINT=${AZURE_AI_FOUNDRY_ENDPOINT}
      - AZURE_AI_FOUNDRY_KEY=${AZURE_AI_FOUNDRY_KEY}
      # Entra ID
      - AZURE_ENTRA_TENANT_ID=${AZURE_ENTRA_TENANT_ID}
      - AZURE_ENTRA_CLIENT_ID=${AZURE_ENTRA_CLIENT_ID}
      - AZURE_ENTRA_CLIENT_SECRET=${AZURE_ENTRA_CLIENT_SECRET}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # PostgreSQL
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/llm_gateway
      # PAT Secret
      - PAT_SECRET=${PAT_SECRET}
      # OpenTelemetry
      - OTEL_EXPORTER_OTLP_GRPC_ENDPOINT=${OTEL_EXPORTER_OTLP_GRPC_ENDPOINT:-http://otel-collector:4317}
      - OTEL_SERVICE_NAME=llm-gateway
      - OTEL_ENABLED=true
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector:0.102.1
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./etc/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.59
    ports:
      - "16686:16686" # Jaeger UI
      - "6831:6831"   # Jaeger agent (ZIPKIN compact format)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_OTLP_GRPC_HOST_PORT=otel-collector:4317
    depends_on:
      - otel-collector
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=llm_gateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
